name = "classroom-translate-proxy"
main = "translate-worker.js"
compatibility_date = "2026-01-01"

# GitHub Pages 배포 주소로 반드시 교체하세요 (예: "https://yourname.github.io").
# 이 값이 실제 사이트 주소와 다르면 브라우저가 CORS 오류로 요청을 차단합니다.
[vars]
ALLOWED_ORIGIN = "https://seon170419-dev.github.io"

# OPENAI_API_KEY는 여기에 적지 않습니다. 아래 명령으로 별도 등록하세요:
#   wrangler secret put OPENAI_API_KEY
